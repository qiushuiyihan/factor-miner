name: Test Mairui API
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test mairui API
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}, size %{size_download}" \
            "http://api.mairuiapi.com/hsrl/zbjy/600519/7DFC8EA6-8F7A-4765-B37D-356EA3F58829" \
            --max-time 30
          echo ""
          curl -s "http://api.mairuiapi.com/hsrl/zbjy/600519/7DFC8EA6-8F7A-4765-B37D-356EA3F58829" \
            --max-time 30 | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{len(d)} ticks')" 2>&1
