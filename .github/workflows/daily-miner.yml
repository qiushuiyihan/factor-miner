name: Daily Factor Miner

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * 1,2,3,4,5'

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy scipy requests gplearn openai stockstats mootdx

      - name: Run factor miner
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p data output
          python src/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: factor-report
          path: output
