name: Daily Factor Miner

on:
  workflow_dispatch:  # 手动触发
  schedule:
    # 北京时间 16:30 (UTC+8) = UTC 08:30, 收盘后1.5小时
    - cron: '30 8 * * 1-5'

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy scipy requests gplearn openai stockstats mootdx

      - name: Fetch Baidu K-line + eastmoney data + tick
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p data/raw data/daily output
          python src/main.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: factor-report-${{ github.run_id }}
          path: output/*/report.md
          retention-days: 30
