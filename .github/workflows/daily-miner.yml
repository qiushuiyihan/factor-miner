名称: 每日因子挖掘器

触发时间:
运行计划:
    # 北京时间 16:30（UTC+8）= UTC 08:30，收盘后1.5小时
    - cron: '30 8 * * 1-5'→ 周一至周五每天08:30执行
workflow_dispatch:  # 手动触发

作业:
挖掘:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - 使用: actions/checkout@v4

      - 名称: 设置 Python
        使用: actions/setup-python@v5
        with:
          Python版本: '3.11'

      - 名称: 安装依赖
        运行: |
          pip install pandas numpy scipy requests gplearn openai stockstats mootdx

      - 名称: 获取百度K线+东方财富数据+逐笔
        环境:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        运行: |
          mkdir -p data/raw data/daily output
          python src/main.py

      - 名称: 上传报告
        用途: actions/upload-artifact@v4
        with:
          名称: factor-report-${{ github.run_id }}
          路径: output/*/report.md
保留天数: 30
